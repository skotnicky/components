name: Prepare CCF Validation Manifests

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]

    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Prepare CCF validation shard manifest
        env:
          SHARD_INDEX: ${{ matrix.shard }}
          SHARD_TOTAL: 4
        run: |
          chmod +x scripts/validate-ccf-catalog.sh
          bash scripts/validate-ccf-catalog.sh

      - name: Upload shard manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ccf-validation-shard-${{ matrix.shard }}
          path: reports/ccf-validation-shard-${{ matrix.shard }}.json
