name: Publish Helm Repository

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Regenerate curated charts
        run: python3 scripts/render_catalog.py

      - name: Validate curated charts
        run: python3 scripts/validate_charts.py

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build classic Helm repository
        env:
          HELM_REPO_URL: ${{ vars.HELM_REPO_URL || format('https://{0}.github.io/{1}', github.repository_owner, github.event.repository.name) }}
        run: |
          chmod +x scripts/package_curated.sh scripts/build_helm_repo.sh
          bash scripts/build_helm_repo.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/helm-repo

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
