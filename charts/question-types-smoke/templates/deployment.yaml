apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ printf "%s-question-types-smoke" .Release.Name | trunc 63 | trimSuffix "-" }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        question-types-smoke/string: {{ .Values.questionTypesSmoke.stringValue | quote }}
        question-types-smoke/enum: {{ .Values.questionTypesSmoke.enumValue | quote }}
        question-types-smoke/boolean: {{ printf "%v" .Values.questionTypesSmoke.booleanValue | quote }}
        question-types-smoke/int: {{ printf "%v" .Values.questionTypesSmoke.intValue | quote }}
        question-types-smoke/list: {{ toJson .Values.questionTypesSmoke.listValue | quote }}
    spec:
      containers:
      - name: pause
        image: "{{ .Values.questionTypesSmoke.image.repository }}:{{ .Values.questionTypesSmoke.image.tag }}"
        imagePullPolicy: {{ .Values.questionTypesSmoke.image.pullPolicy }}
        env:
        - name: QUESTION_TYPES_STRING
          value: {{ .Values.questionTypesSmoke.stringValue | quote }}
        - name: QUESTION_TYPES_ENUM
          value: {{ .Values.questionTypesSmoke.enumValue | quote }}
        - name: QUESTION_TYPES_BOOLEAN
          value: {{ printf "%v" .Values.questionTypesSmoke.booleanValue | quote }}
        - name: QUESTION_TYPES_INT
          value: {{ printf "%v" .Values.questionTypesSmoke.intValue | quote }}
        - name: QUESTION_TYPES_LIST
          value: {{ toJson .Values.questionTypesSmoke.listValue | quote }}
