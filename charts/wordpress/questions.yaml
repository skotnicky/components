  required: false
- variable: wordpress.persistence.size
  label: Content PVC size
  type: string
  default: 5Gi
  description: Persistent volume size for WordPress content.
  group: Storage
  required: true
- variable: wordpress.wordpress.adminEmail
  label: Admin email
  type: string
  default: admin@example.com
  description: Administrator email used during bootstrap.
  group: Application
  required: true
