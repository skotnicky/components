{{- $v := .Values.netbox -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ccf.netbox.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "ccf.netbox.labels" . | nindent 4 }}
    app.kubernetes.io/component: netbox
spec:
  type: {{ $v.service.type }}
  ports:
    - name: http
      port: {{ $v.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "ccf.netbox.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: netbox
