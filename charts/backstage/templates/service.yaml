{{- $v := .Values.backstage -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ccf.backstage.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "ccf.backstage.labels" . | nindent 4 }}
    app.kubernetes.io/component: backstage
spec:
  type: {{ $v.service.type }}
  ports:
    - name: http
      port: {{ $v.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "ccf.backstage.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backstage
