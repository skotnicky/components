# Generated from scripts/catalog_data.py.
# This file follows the common Rancher-style questions.yaml shape so catalog UIs can
# present CCF-friendly prompts.
questions:
- variable: backstage.ingress.enabled
  label: Enable ingress
  type: boolean
  default: false
  description: Expose Backstage through an ingress resource.
  group: Networking
  required: false
- variable: backstage.ingress.className
  label: Ingress class
  type: string
  default: taikun
  description: Optional ingressClassName used when exposing Backstage through the
    cluster ingress controller. Leave blank to rely on the cluster default ingress
    class.
  group: Networking
  required: false
- variable: backstage.ingress.host
  label: Ingress hostname
  type: string
  default: backstage.local
  description: Hostname used when ingress is enabled.
  group: Networking
  required: false
- variable: backstage.service.type
  label: Service type
  type: enum
  default: ClusterIP
  description: Service exposure mode for the Backstage backend.
  group: Networking
  required: false
  options:
  - ClusterIP
  - LoadBalancer
  - NodePort
- variable: backstage.app.replicas
  label: Replica count
  type: int
  default: 1
  description: Number of Backstage application replicas.
  group: Application
  required: true
- variable: backstage.database.host
  label: PostgreSQL host
  type: string
  default: postgres-rw.backstage.svc.cluster.local
  description: Hostname of the external PostgreSQL service used by Backstage.
  group: Database
  required: true
- variable: backstage.database.port
  label: PostgreSQL port
  type: int
  default: 5432
  description: Port exposed by the external PostgreSQL service.
  group: Database
  required: true
- variable: backstage.database.name
  label: PostgreSQL database
  type: string
  default: backstage
  description: Database name used by Backstage.
  group: Database
  required: true
- variable: backstage.database.user
  label: PostgreSQL username
  type: string
  default: backstage
  description: Username used by Backstage when connecting to PostgreSQL.
  group: Database
  required: true
- variable: backstage.database.existingSecretName
  label: Database secret name
  type: string
  default: backstage-postgresql
  description: Secret containing the Backstage PostgreSQL password.
  group: Database
  required: true
- variable: backstage.database.existingSecretKey
  label: Database secret key
  type: string
  default: password
  description: Key inside the database Secret that stores the Backstage PostgreSQL
    password.
  group: Database
  required: true
