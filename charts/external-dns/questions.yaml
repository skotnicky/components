# Generated from scripts/catalog_data.py.
# This file follows the common Rancher-style questions.yaml shape so catalog UIs can
# present CCF-friendly prompts.
questions:
- variable: external-dns.provider.name
  label: DNS provider
  type: string
  default: aws
  description: Provider name accepted by the upstream external-dns chart.
  group: Provider
  required: true
- variable: external-dns.txtOwnerId
  label: TXT owner ID
  type: string
  default: ccf-external-dns
  description: Identifier used for TXT registry ownership records.
  group: Provider
  required: true
- variable: external-dns.sources[0]
  label: Primary watched source
  type: string
  default: service
  description: First resource source external-dns should watch.
  group: Application
  required: true
- variable: external-dns.sources[1]
  label: Secondary watched source
  type: string
  default: ingress
  description: Second resource source external-dns should watch when dual-source reconciliation
    is needed.
  group: Application
  required: false
- variable: external-dns.domainFilters[0]
  label: Domain filter 1
  type: string
  default: ''
  description: Optional DNS zone to scope the controller to. Leave blank to keep the
    default empty list.
  group: Provider
  required: false
- variable: external-dns.domainFilters[1]
  label: Domain filter 2
  type: string
  default: ''
  description: Optional second DNS zone to scope the controller to. Leave blank to
    keep the default empty list.
  group: Provider
  required: false
- variable: external-dns.policy
  label: Update policy
  type: enum
  default: upsert-only
  description: How external-dns should apply record changes.
  group: Provider
  required: false
  options:
  - upsert-only
  - sync
  - create-only
